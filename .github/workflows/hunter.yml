name: Oracle A1 Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */6 * * *"

permissions:
  contents: write

concurrency:
  group: oracle-a1-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      - name: Check completion flag
        id: done
        run: |
          if [ -f instance_created.flag ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "Instance already created earlier. Skipping."
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.done.outputs.created != 'true'
        with:
          python-version: "3.10"

      - name: Install dependencies
        if: steps.done.outputs.created != 'true'
        run: pip install -r requirements.txt

      - name: Write config files
        if: steps.done.outputs.created != 'true'
        env:
          OCI_CONFIG_SECRET: ${{ secrets.OCI_CONFIG }}
          OCI_PRIVATE_KEY_SECRET: ${{ secrets.OCI_PRIVATE_KEY }}
          CONFIGURATION_INI_SECRET: ${{ secrets.CONFIGURATION_INI }}
        run: |
          printf '%s\n' "$OCI_CONFIG_SECRET" > config
          printf '%s\n' "$OCI_PRIVATE_KEY_SECRET" > oci_private_key.pem
          printf '%s\n' "$CONFIGURATION_INI_SECRET" > configuration.ini
          chmod 600 oci_private_key.pem

      - name: Read previous attempt counter
        if: steps.done.outputs.created != 'true'
        run: |
          if [ -f attempt_count.txt ] && grep -Eq '^[0-9]+$' attempt_count.txt; then
            PREV_ATTEMPTS=$(cat attempt_count.txt)
          else
            PREV_ATTEMPTS=0
          fi

          echo "PREV_ATTEMPTS=$PREV_ATTEMPTS" >> "$GITHUB_ENV"
          echo "Previous failed attempts: $PREV_ATTEMPTS"

      - name: Run hunter time slice
        if: steps.done.outputs.created != 'true'
        run: |
          set +e
          timeout 21000s python3 bot.py 2>&1 | tee bot_run.log
          CODE=${PIPESTATUS[0]}
          echo "BOT_EXIT_CODE=$CODE" >> "$GITHUB_ENV"
          echo "Bot exit code: $CODE"
          exit 0

      - name: Finalize state and fallback notification
        if: steps.done.outputs.created != 'true'
        run: |
          python3 - <<'PY'
          import configparser
          import re
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          counter_path = Path("attempt_count.txt")

          try:
              total_attempts = max(
                  0,
                  int(counter_path.read_text(encoding="utf-8").strip())
              )
          except (FileNotFoundError, ValueError):
              total_attempts = 0
              counter_path.write_text("0\n", encoding="utf-8")

          try:
              log = Path("bot_run.log").read_text(
                  encoding="utf-8",
                  errors="replace"
              )
          except FileNotFoundError:
              log = ""

          print(f"Persistent failed attempts: {total_attempts}")

          flag_path = Path("instance_created.flag")
          if not flag_path.exists():
              raise SystemExit(0)

          if "Telegram success notification sent" in log:
              print("Bot already sent the success notification.")
              raise SystemExit(0)

          ip_match = re.search(
              r"Public IP:\s*"
              r"([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+|pending)",
              log,
          )
          public_ip = ip_match.group(1) if ip_match else "pending"

          cfg = configparser.ConfigParser()
          cfg.read("configuration.ini")

          bot_token = cfg.get(
              "Telegram",
              "bot_token",
              fallback="",
          ).strip()
          tg_uid = cfg.get(
              "Telegram",
              "uid",
              fallback="",
          ).strip()

          if not bot_token or ":" not in bot_token:
              print("Telegram token is missing or invalid.")
              raise SystemExit(0)

          if not tg_uid or tg_uid == "xxxx":
              print("Telegram UID is missing or invalid.")
              raise SystemExit(0)

          message = (
              "🎉 Oracle A1 created!\n\n"
              f"Failed attempts before success: {total_attempts}\n"
              f"Successful attempt number: {total_attempts + 1}\n"
              f"Public IP: {public_ip}\n\n"
              "Disable the GitHub Actions workflow now."
          )

          url = (
              f"https://api.telegram.org/"
              f"bot{bot_token}/sendMessage"
          )
          data = urllib.parse.urlencode({
              "chat_id": tg_uid,
              "text": message,
          }).encode("utf-8")

          last_error = None

          for attempt in range(1, 4):
              try:
                  with urllib.request.urlopen(
                      url,
                      data=data,
                      timeout=30,
                  ) as response:
                      print(
                          "Telegram fallback report sent:",
                          response.status,
                      )
                  break
              except Exception as exc:
                  last_error = exc
                  print(
                      f"Telegram fallback attempt "
                      f"{attempt}/3 failed:",
                      repr(exc),
                  )

                  if attempt < 3:
                      time.sleep(5)
          else:
              print(
                  "Telegram fallback report completely failed:",
                  repr(last_error),
              )
          PY

      - name: Commit persistent state
        if: steps.done.outputs.created != 'true'
        run: |
          cp attempt_count.txt /tmp/attempt_count.txt

          if [ -f instance_created.flag ]; then
            cp instance_created.flag /tmp/instance_created.flag
          fi

          git fetch origin "$GITHUB_REF_NAME"
          git reset --hard "origin/$GITHUB_REF_NAME"
          git clean -fd

          cp /tmp/attempt_count.txt attempt_count.txt

          if [ -f /tmp/instance_created.flag ]; then
            cp /tmp/instance_created.flag instance_created.flag
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add attempt_count.txt

          if [ -f instance_created.flag ]; then
            git add instance_created.flag
          fi

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update Oracle A1 hunter state"
            git push origin HEAD:"$GITHUB_REF_NAME"
          fi

      - name: Fail if bot crashed
        if: steps.done.outputs.created != 'true'
        run: |
          if [ "$BOT_EXIT_CODE" != "0" ] && [ "$BOT_EXIT_CODE" != "124" ]; then
            echo "Bot crashed with code $BOT_EXIT_CODE"
            exit "$BOT_EXIT_CODE"
          fi
