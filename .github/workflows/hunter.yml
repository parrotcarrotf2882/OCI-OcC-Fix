name: Oracle A1 Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */6 * * *"

concurrency:
  group: oracle-a1-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config files
        env:
          OCI_CONFIG_SECRET: ${{ secrets.OCI_CONFIG }}
          OCI_PRIVATE_KEY_SECRET: ${{ secrets.OCI_PRIVATE_KEY }}
          CONFIGURATION_INI_SECRET: ${{ secrets.CONFIGURATION_INI }}
        run: |
          printf '%s\n' "$OCI_CONFIG_SECRET" > config
          printf '%s\n' "$OCI_PRIVATE_KEY_SECRET" > oci_private_key.pem
          printf '%s\n' "$CONFIGURATION_INI_SECRET" > configuration.ini
          chmod 600 oci_private_key.pem

      - name: Debug availability_domains
        run: |
          python3 - <<'PY'
          import configparser, json
          cfg = configparser.ConfigParser()
          cfg.read("configuration.ini")
          v = cfg.get("OCI", "availability_domains")
          print("availability_domains repr:", repr(v))
          print("availability_domains parsed:", json.loads(v))
          PY

      - name: Run hunter
        run: python3 bot.py
